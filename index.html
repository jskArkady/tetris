<!DOCTYPE html>
<html lang="en" data-theme="dark" data-style="fluent">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Overlay screens (position:fixed, toggled with .screen--active) -->
  <div id="screen-start" class="screen screen--active">
    <div class="screen__content">
      <p class="menu-kicker">Modern Arcade</p>
      <h1 class="screen__title">TETRIS</h1>
      <p id="menu-appearance-summary" class="menu-summary"></p>

      <div class="screen__actions screen__actions--stack">
        <button id="btn-start" class="screen__btn">PRESS START</button>
        <button id="btn-open-options" class="screen__btn screen__btn--secondary">OPTIONS</button>
      </div>

      <div class="screen__controls">
        <div class="controls-grid">
          <span>Move</span><span>← →</span>
          <span>Rotate CW</span><span>↑ / X</span>
          <span>Rotate CCW</span><span>Z</span>
          <span>Soft Drop</span><span>↓</span>
          <span>Hard Drop</span><span>Space</span>
          <span>Hold</span><span>C / Shift</span>
          <span>Pause</span><span>Esc</span>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-options" class="screen">
    <div class="screen__content screen__content--options">
      <p class="menu-kicker">Appearance Settings</p>
      <h2 class="screen__title">OPTIONS</h2>
      <p id="options-subtitle" class="screen__subtitle"></p>

      <section class="settings-block">
        <div class="settings-block__header">
          <h3 id="options-mode-title" class="settings-block__title"></h3>
          <p id="options-mode-copy" class="settings-block__copy"></p>
        </div>
        <div class="mode-toggle" role="group" aria-label="Color Mode">
          <button class="mode-chip is-selected" data-mode-value="dark" aria-pressed="true">Dark</button>
          <button class="mode-chip" data-mode-value="bright" aria-pressed="false">Bright</button>
        </div>
      </section>

      <section class="settings-block settings-block--themes">
        <div class="settings-block__header settings-block__header--compact">
          <h3 id="options-themes-title" class="settings-block__title"></h3>
          <p id="options-themes-copy" class="settings-block__copy"></p>
        </div>
        <div id="preset-grid" class="preset-grid"></div>
      </section>

      <div class="screen__actions">
        <button id="btn-options-back" class="screen__btn screen__btn--secondary">BACK TO MENU</button>
      </div>
      <p class="screen__subtitle">Press <kbd>Esc</kbd> to return.</p>
    </div>
  </div>

  <div id="screen-pause" class="screen">
    <div class="screen__content">
      <h2 class="screen__title">PAUSED</h2>
      <p class="screen__subtitle">Press <kbd>Esc</kbd> to Resume</p>
    </div>
  </div>

  <div id="screen-gameover" class="screen">
    <div class="screen__content">
      <h2 class="screen__title">GAME OVER</h2>
      <p class="screen__final-score">Score: <span id="final-score">0</span></p>
      <p class="screen__high-score">Best: <span id="high-score-display">0</span></p>
      <div class="screen__actions">
        <button id="btn-play-again" class="screen__btn">PLAY AGAIN</button>
        <button id="btn-open-options-gameover" class="screen__btn screen__btn--secondary">OPTIONS</button>
      </div>
      <p class="screen__subtitle">or press <kbd>Enter</kbd> to restart</p>
    </div>
  </div>

  <!-- Main game layout -->
  <main id="game-container" class="game-container">

    <!-- Left panel: Hold + Stats -->
    <aside class="panel panel--left">
      <div class="panel__section">
        <h3 class="panel__label">HOLD</h3>
        <canvas id="canvas-hold" width="120" height="120"></canvas>
      </div>
      <div class="panel__section panel__section--stats">
        <div class="stat">
          <span class="stat__label">SCORE</span>
          <span class="stat__value" id="hud-score">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">LEVEL</span>
          <span class="stat__value" id="hud-level">1</span>
        </div>
        <div class="stat">
          <span class="stat__label">LINES</span>
          <span class="stat__value" id="hud-lines">0</span>
        </div>
        <div class="stat">
          <span class="stat__label">BEST</span>
          <span class="stat__value" id="hud-high-score">0</span>
        </div>
      </div>
    </aside>

    <!-- Center: Main board -->
    <div id="board-wrapper" class="board-wrapper">
      <canvas id="canvas-board"></canvas>
      <div id="action-text" class="action-text" aria-live="polite">
        <span id="action-text-headline" class="action-text__headline"></span>
        <span id="action-text-detail" class="action-text__detail"></span>
      </div>
      <div id="level-up-text" class="level-up-text" aria-live="polite"></div>
    </div>

    <!-- Right panel: Next queue -->
    <aside class="panel panel--right">
      <div class="panel__section">
        <h3 class="panel__label">NEXT</h3>
        <canvas id="canvas-next" width="120" height="360"></canvas>
      </div>
    </aside>

  </main>

  <script src="theme-options.js"></script>
  <script src="effects.js"></script>
  <script src="game.js"></script>
</body>
</html>
